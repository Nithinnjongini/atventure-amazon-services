        - paragraph [ref=e19]: Who We Are
        - heading "A retail team built on partnerships, category knowledge, and long-view growth thinking." [level=1] [ref=e20]
        - generic [ref=e21]:
          - paragraph [ref=e22]: A manufacturer and retailer relationship can range from simply transactional to a long-term partnership of aligning visions.
          - paragraph [ref=e23]: Atventure Retail Group was founded in 2013 and grew by pairing retail expertise, manufacturing excellence, collaboration, and forward-thinking problem solving.
          - paragraph [ref=e24]: This Amazon-focused site keeps that story intact while giving the digital channel a clearer front door.
      - img "Atventure team environment" [ref=e26]
    - generic [ref=e27]:
      - generic [ref=e28]:
        - paragraph [ref=e29]: Executive Team
        - heading "Leadership shaped by retailer-side and manufacturer-side experience." [level=2] [ref=e30]
        - paragraph [ref=e31]: The existing biography page was one of the site’s strongest credibility assets, so this version preserves the fuller founder story instead of reducing it to a short summary.
      - generic [ref=e32]:
        - generic [ref=e33]:
          - img "Troy Peterson" [ref=e34]
          - generic [ref=e35]:
            - paragraph [ref=e36]: Founded in Minneapolis
            - paragraph [ref=e37]: Retail experience, manufacturing partnership, and long-view account leadership brought together in one group.
        - article [ref=e38]:
          - heading "Troy Peterson" [level=3] [ref=e39]
          - paragraph [ref=e40]: Founder
          - generic [ref=e41]:
            - paragraph [ref=e42]: With over 32 years of retail experience, Troy began his retail journey in 1994 at Target as a Business Analyst. During 17 years there, in progressive merchandising and planning roles including Manager, Buyer, and Senior Buyer, he developed a passion for collaborating with manufacturers to create the strongest possible products and presentation.
            - paragraph [ref=e43]: At Target, he worked across Sporting Goods, Apparel, Electronics, Video Games, Home Improvement, and Grocery. That wide category range built deep experience in branding, licensing, private label, product development, packaging, and new product launch marketing.
            - paragraph [ref=e44]: In 2010, Troy joined Toys R Us as DMM overseeing Electronics and Entertainment, where he led marketing for exclusive launches, developed private-label electronics, and expanded the digital business on toysrus.com.
            - paragraph [ref=e45]: Driven by a passion for product and presentation, Troy partnered with Andy Weiner in 2013 to create Atventure, combining retailer-side expertise with decades of manufacturer-representation experience.
        - article [ref=e46]:
          - heading "Andy Weiner" [level=3] [ref=e47]
          - paragraph [ref=e48]: Executive Advisor
          - generic [ref=e49]:
            - paragraph [ref=e50]: Andy started his career 45 years ago with the Milton Bradley Toy Company, where he developed a 360-degree view of manufacturing and sales.
            - paragraph [ref=e51]: In 1983, he became a manufacturer representative with the company that eventually became Toy N Around. Over the next 35 years, his leadership helped build long-term strategic partnerships for vendors at Target in the Toy department and contributed to over $3B in retail sales.
            - paragraph [ref=e52]: Outside of work, Andy has a long history of supporting children-focused nonprofits, including the Children’s Cancer Research Fund and Make-A-Wish Foundation.
